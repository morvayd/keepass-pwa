<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#16213e">
    <title>KeePass PWA Viewer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="container">
                <div class="logo">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h1>KeePass PWA</h1>
                <p class="subtitle">Secure Password Viewer</p>
                
                <div class="file-input-wrapper">
                    <input type="file" id="file-input" accept=".kdbx" class="file-input">
                    <label for="file-input" class="file-label">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                            <polyline points="13 2 13 9 20 9"></polyline>
                        </svg>
                        <span id="file-name">Choose .kdbx file</span>
                    </label>
                </div>

                <div class="input-group">
                    <input type="password" id="password-input" placeholder="Master Password" autocomplete="off">
                    <button type="button" id="toggle-password" class="toggle-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>

                <button id="unlock-btn" class="btn btn-primary" disabled>
                    <span>Unlock Database</span>
                </button>

                <div id="error-message" class="error-message"></div>
            </div>
        </div>

        <!-- Main Screen -->
        <div id="main-screen" class="screen">
            <header class="header">
                <div class="header-content">
                    <h2 id="db-name">Database</h2>
                    <div class="header-actions">
                        <button id="search-toggle" class="icon-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                        <button id="lock-btn" class="icon-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="search-bar" class="search-bar">
                    <input type="text" id="search-input" placeholder="Search entries...">
                </div>
            </header>

            <div class="content">
                <div id="groups-list" class="groups-list"></div>
                <div id="entries-list" class="entries-list"></div>
            </div>
        </div>

        <!-- Entry Detail Modal -->
        <div id="entry-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="entry-title">Entry Details</h3>
                    <button id="close-modal" class="icon-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body" id="entry-details"></div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading database...</p>
        </div>
    </div>

    <!-- Include kdbxweb library - Download for offline use -->
    <script src="js/kdbxweb.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
